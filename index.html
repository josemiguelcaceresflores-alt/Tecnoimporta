<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecnoimporta Bolivia — Pedidos por WhatsApp</title>

<meta name="twitter:title" content="Tecnoimporta Bolivia — Pedidos por WhatsApp">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080a12;
    --bg2:      #0d1020;
    --panel:    #111628;
    --border:   #1e2a4a;
    --blue:     #2979ff;
    --purple:   #7c3aed;
    --cyan:     #00e5ff;
    --glow-b:   rgba(41,121,255,0.35);
    --glow-p:   rgba(124,58,237,0.35);
    --text:     #e8eaf6;
    --muted:    #6b7db3;
    --offer:    #00e676;
    --radius:   12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BG ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(41,121,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,121,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    padding: 36px 20px 32px;
    text-align: center;
    overflow: hidden;
    z-index: 1;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 900;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--blue), var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* STEP DOTS */
  .step-track {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 0 auto;
    max-width: 280px;
  }
  .s-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--muted);
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .s-dot.active {
    border-color: var(--blue);
    background: var(--blue);
    color: #fff;
    box-shadow: 0 0 14px var(--glow-b);
  }
  .s-dot.done {
    border-color: var(--offer);
    background: var(--offer);
    color: #000;
  }
  .s-line {
    height: 2px; flex: 1;
    background: var(--border);
    transition: background 0.4s;
  }
  .s-line.done { background: var(--offer); }

  /* ── WRAP ── */
  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── STEPS ── */
  .step { display: none; animation: fadeUp 0.4s ease; }
  .step.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PRODUCT CARD ── */
  .product-hero {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
  }
  .product-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(41,121,255,0.08), rgba(124,58,237,0.08));
    pointer-events: none;
  }

  /* FOTO PLACEHOLDER — reemplazá el src con tu foto real */
  .product-img-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0d1428 0%, #1a0d2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    position: relative;
    overflow: hidden;
  }
  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none; /* Se muestra cuando tenga src real */
  }
  .product-img-wrap img.loaded { display: block; }
  .product-img-wrap .emoji-placeholder { transition: opacity 0.3s; }

  /* GLOW línea decorativa */
  .product-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--cyan));
  }

  /* BADGE OFERTA */
  .badge-oferta {
    position: absolute;
    top: 14px; right: 14px;
    background: linear-gradient(135deg, #ff6d00, #ff1744);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 6px;
    letter-spacing: 0.1em;
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px rgba(255,23,68,0.5); }
    50%      { box-shadow: 0 0 22px rgba(255,23,68,0.8); }
  }

  .product-info {
    padding: 18px 20px 20px;
  }
  .product-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .product-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .price-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .price-old {
    font-size: 14px;
    color: var(--muted);
    text-decoration: line-through;
  }
  .price-new {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--offer);
    text-shadow: 0 0 20px rgba(0,230,118,0.4);
  }
  .price-tag {
    font-size: 13px;
    color: var(--muted);
    align-self: flex-end;
    margin-bottom: 4px;
  }
  .savings-tag {
    display: inline-block;
    background: rgba(0,230,118,0.12);
    border: 1px solid rgba(0,230,118,0.3);
    color: var(--offer);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* FEATURES */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .feat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .feat:hover { border-color: var(--blue); }
  .feat span:first-child { font-size: 18px; }
  .feat strong { display: block; color: var(--text); font-size: 12px; margin-bottom: 1px; }

  /* ── QTY ── */
  .qty-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .qty-label { font-size: 14px; font-weight: 600; }
  .qty-controls { display: flex; align-items: center; gap: 14px; }
  .qty-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover { border-color: var(--blue); color: var(--blue); }
  .qty-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
    color: var(--cyan);
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 28px 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .sec-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* ── FIELDS ── */
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }
  label .req { color: #ff5252; }

  input[type="text"],
  input[type="tel"],
  textarea {
    width: 100%;
    padding: 13px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  input::placeholder, textarea::placeholder { color: #3a4a6b; }
  input:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(41,121,255,0.15);
  }
  input.err { border-color: #ff5252; }
  .err-msg { font-size: 11px; color: #ff5252; margin-top: 5px; display: none; }
  textarea { resize: vertical; min-height: 75px; }

  /* ── PILLS ── */
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .pill {
    padding: 9px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .pill:hover { border-color: var(--blue); color: var(--text); }
  .pill.selected {
    background: rgba(41,121,255,0.15);
    border-color: var(--blue);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(41,121,255,0.2);
  }

  /* ── SUMMARY ── */
  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .sum-head {
    background: linear-gradient(135deg, rgba(41,121,255,0.15), rgba(124,58,237,0.15));
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.1em;
  }
  .sum-body { padding: 16px 18px; }
  .sum-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--muted);
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-row .val { color: var(--text); font-weight: 600; }
  .sum-total {
    background: rgba(0,230,118,0.06);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }
  .sum-total .label { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--offer); letter-spacing: 0.08em; }
  .sum-total .amount { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; color: var(--offer); text-shadow: 0 0 20px rgba(0,230,118,0.4); }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border: none;
    border-radius: var(--radius);
    padding: 15px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(41,121,255,0.3);
  }
  .btn-next:hover { box-shadow: 0 4px 28px rgba(41,121,255,0.5); transform: translateY(-1px); }
  .btn-next:active { transform: translateY(0); }

  .btn-back {
    width: 48px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--blue); color: var(--text); }

  /* WA BUTTON */
  .btn-wa {
    width: 100%;
    background: linear-gradient(135deg, #00c853, #00e676);
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 24px rgba(0,230,118,0.35);
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .btn-wa:hover { box-shadow: 0 4px 32px rgba(0,230,118,0.55); transform: translateY(-1px); }
  .btn-wa svg { width: 20px; height: 20px; fill: #000; }

  /* NOTICE */
  .notice {
    background: rgba(41,121,255,0.07);
    border: 1px solid rgba(41,121,255,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  /* SUCCESS */
  .success-screen { display: none; text-align: center; padding: 48px 20px 20px; }
  .success-screen.active { display: block; animation: fadeUp 0.5s ease; }
  .success-icon {
    width: 90px; height: 90px;
    margin: 0 auto 24px;
    background: rgba(0,230,118,0.1);
    border: 2px solid var(--offer);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    box-shadow: 0 0 40px rgba(0,230,118,0.25);
  }
  .success-screen h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--offer);
    margin-bottom: 10px;
  }
  .success-screen p { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 30px; }

  /* DECORATIVE LINES */
  .deco-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--purple), transparent);
    margin: 6px 0 24px;
    opacity: 0.4;
  }
</style>
</head>

<style>
  :root {
    --bg:       #080a12;
    --bg2:      #0d1020;
    --panel:    #111628;
    --border:   #1e2a4a;
    --blue:     #2979ff;
    --purple:   #7c3aed;
    --cyan:     #00e5ff;
    --glow-b:   rgba(41,121,255,0.35);
    --glow-p:   rgba(124,58,237,0.35);
    --text:     #e8eaf6;
    --muted:    #6b7db3;
    --offer:    #00e676;
    --radius:   12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BG ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(41,121,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,121,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    padding: 36px 20px 32px;
    text-align: center;
    overflow: hidden;
    z-index: 1;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 900;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--blue), var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* STEP DOTS */
  .step-track {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 0 auto;
    max-width: 280px;
  }
  .s-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--muted);
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .s-dot.active {
    border-color: var(--blue);
    background: var(--blue);
    color: #fff;
    box-shadow: 0 0 14px var(--glow-b);
  }
  .s-dot.done {
    border-color: var(--offer);
    background: var(--offer);
    color: #000;
  }
  .s-line {
    height: 2px; flex: 1;
    background: var(--border);
    transition: background 0.4s;
  }
  .s-line.done { background: var(--offer); }

  /* ── WRAP ── */
  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── STEPS ── */
  .step { display: none; animation: fadeUp 0.4s ease; }
  .step.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PRODUCT CARD ── */
  .product-hero {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
  }
  .product-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(41,121,255,0.08), rgba(124,58,237,0.08));
    pointer-events: none;
  }

  /* FOTO PLACEHOLDER — reemplazá el src con tu foto real */
  .product-img-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0d1428 0%, #1a0d2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    position: relative;
    overflow: hidden;
  }
  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none; /* Se muestra cuando tenga src real */
  }
  .product-img-wrap img.loaded { display: block; }
  .product-img-wrap .emoji-placeholder { transition: opacity 0.3s; }

  /* GLOW línea decorativa */
  .product-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--cyan));
  }

  /* BADGE OFERTA */
  .badge-oferta {
    position: absolute;
    top: 14px; right: 14px;
    background: linear-gradient(135deg, #ff6d00, #ff1744);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 6px;
    letter-spacing: 0.1em;
    box-shadow: 0 0 12px rgba(255,23,68,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px rgba(255,23,68,0.5); }
    50%      { box-shadow: 0 0 22px rgba(255,23,68,0.8); }
  }

  .product-info {
    padding: 18px 20px 20px;
  }
  .product-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .product-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .price-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .price-old {
    font-size: 14px;
    color: var(--muted);
    text-decoration: line-through;
  }
  .price-new {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--offer);
    text-shadow: 0 0 20px rgba(0,230,118,0.4);
  }
  .price-tag {
    font-size: 13px;
    color: var(--muted);
    align-self: flex-end;
    margin-bottom: 4px;
  }
  .savings-tag {
    display: inline-block;
    background: rgba(0,230,118,0.12);
    border: 1px solid rgba(0,230,118,0.3);
    color: var(--offer);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* FEATURES */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .feat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .feat:hover { border-color: var(--blue); }
  .feat span:first-child { font-size: 18px; }
  .feat strong { display: block; color: var(--text); font-size: 12px; margin-bottom: 1px; }

  /* ── QTY ── */
  .qty-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .qty-label { font-size: 14px; font-weight: 600; }
  .qty-controls { display: flex; align-items: center; gap: 14px; }
  .qty-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover { border-color: var(--blue); color: var(--blue); }
  .qty-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
    color: var(--cyan);
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 28px 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .sec-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* ── FIELDS ── */
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }
  label .req { color: #ff5252; }

  input[type="text"],
  input[type="tel"],
  textarea {
    width: 100%;
    padding: 13px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  input::placeholder, textarea::placeholder { color: #3a4a6b; }
  input:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(41,121,255,0.15);
  }
  input.err { border-color: #ff5252; }
  .err-msg { font-size: 11px; color: #ff5252; margin-top: 5px; display: none; }
  textarea { resize: vertical; min-height: 75px; }

  /* ── PILLS ── */
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .pill {
    padding: 9px 16px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .pill:hover { border-color: var(--blue); color: var(--text); }
  .pill.selected {
    background: rgba(41,121,255,0.15);
    border-color: var(--blue);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(41,121,255,0.2);
  }

  /* ── SUMMARY ── */
  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .sum-head {
    background: linear-gradient(135deg, rgba(41,121,255,0.15), rgba(124,58,237,0.15));
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.1em;
  }
  .sum-body { padding: 16px 18px; }
  .sum-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--muted);
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-row .val { color: var(--text); font-weight: 600; }
  .sum-total {
    background: rgba(0,230,118,0.06);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }
  .sum-total .label { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--offer); letter-spacing: 0.08em; }
  .sum-total .amount { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; color: var(--offer); text-shadow: 0 0 20px rgba(0,230,118,0.4); }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border: none;
    border-radius: var(--radius);
    padding: 15px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(41,121,255,0.3);
  }
  .btn-next:hover { box-shadow: 0 4px 28px rgba(41,121,255,0.5); transform: translateY(-1px); }
  .btn-next:active { transform: translateY(0); }

  .btn-back {
    width: 48px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--blue); color: var(--text); }

  /* WA BUTTON */
  .btn-wa {
    width: 100%;
    background: linear-gradient(135deg, #00c853, #00e676);
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 24px rgba(0,230,118,0.35);
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .btn-wa:hover { box-shadow: 0 4px 32px rgba(0,230,118,0.55); transform: translateY(-1px); }
  .btn-wa svg { width: 20px; height: 20px; fill: #000; }

  /* NOTICE */
  .notice {
    background: rgba(41,121,255,0.07);
    border: 1px solid rgba(41,121,255,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  /* SUCCESS */
  .success-screen { display: none; text-align: center; padding: 48px 20px 20px; }
  .success-screen.active { display: block; animation: fadeUp 0.5s ease; }
  .success-icon {
    width: 90px; height: 90px;
    margin: 0 auto 24px;
    background: rgba(0,230,118,0.1);
    border: 2px solid var(--offer);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    box-shadow: 0 0 40px rgba(0,230,118,0.25);
  }
  .success-screen h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--offer);
    margin-bottom: 10px;
  }
  .success-screen p { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 30px; }

  /* DECORATIVE LINES */
  .deco-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--purple), transparent);
    margin: 6px 0 24px;
    opacity: 0.4;
  }
</style>
</head>
